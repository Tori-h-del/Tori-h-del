<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>新增菜品</title>
  </head>
  <body>
    <h1>新增菜品</h1>
    <a href="/dishes">返回菜品列表</a>

    <form action="/dishes" method="post">
      <p>
        <label>菜名：</label>
        <input name="name" type="text" required />
      </p>
      <p>
        <label>分类：</label>
        <input name="category" type="text" required />
      </p>
      <p>
        <label>价格：</label>
        <input name="price" type="number" step="0.01" required />
      </p>
      <button type="submit">保存</button>
    </form>
  </body>
</html>
