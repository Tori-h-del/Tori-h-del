<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>新增订单</title>
  </head>
  <body>
    <h1>新增订单</h1>
    <a href="/orders">返回订单列表</a>

    <form action="/orders" method="post">
      <p>
        <label>下单人：</label>
        <input name="customer_name" type="text" required />
      </p>
      <p>
        <label>菜品：</label>
        <select name="dish_id" required>
          {% for dish in dishes %}
          <option value="{{ dish.id }}">{{ dish.name }} - {{ dish.price }}元</option>
          {% endfor %}
        </select>
      </p>
      <p>
        <label>数量：</label>
        <input name="quantity" type="number" min="1" value="1" required />
      </p>
      <button type="submit">保存订单</button>
    </form>
  </body>
</html>
